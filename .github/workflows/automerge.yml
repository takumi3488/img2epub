name: PR Auto-merge

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
          
      - name: Install Task
        uses: arduino/setup-task@v3.0.0
          
      - name: Run tests
        run: task test

